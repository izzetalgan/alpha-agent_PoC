<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alpha Agent | Quantitative AI Engine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: '#0d0f14',
            card: '#12151c',
            border: '#1e2230',
            muted: '#1a1d26',
            primary: '#2dd4bf',
            news: '#a78bfa',
            fundamentals: '#2dd4bf',
            risk: '#fbbf24',
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #0d0f14;
      color: #f1f5f9;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .glow-primary {
      box-shadow: 0 0 30px rgba(45, 212, 191, 0.15);
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .animate-spin {
      animation: spin 1s linear infinite;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // SVG Icons as components
    const ActivityIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2"/>
      </svg>
    );

    const NewspaperIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/>
        <path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/>
      </svg>
    );

    const BarChartIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <line x1="12" x2="12" y1="20" y2="10"/><line x1="18" x2="18" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="16"/>
      </svg>
    );

    const AlertTriangleIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/>
        <path d="M12 9v4"/><path d="M12 17h.01"/>
      </svg>
    );

    const TargetIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>
      </svg>
    );

    const SearchIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
      </svg>
    );

    const AlertCircleIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>
      </svg>
    );

    const Spinner = () => (
      <svg className="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
        <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
    );

    function AgentCard({ title, icon, content, accentColor, glowColor }) {
      return (
        <div 
          className="relative rounded-xl border border-border bg-card p-6 transition-all duration-300 hover:border-opacity-60"
          style={{ borderColor: accentColor + '40' }}
        >
          <div className="absolute inset-0 rounded-xl opacity-5" style={{ background: `linear-gradient(135deg, ${accentColor}20 0%, transparent 50%)` }}></div>
          <div className="relative">
            <div className="flex items-center gap-3 mb-4">
              <div className="p-2 rounded-lg" style={{ backgroundColor: accentColor + '20', color: accentColor }}>
                {icon}
              </div>
              <h3 className="text-lg font-semibold text-slate-100">{title}</h3>
            </div>
            <div className="text-slate-300 text-sm leading-relaxed whitespace-pre-wrap">
              {content || <span className="text-slate-500 italic">No data available</span>}
            </div>
          </div>
        </div>
      );
    }

    function MasterDecisionCard({ content }) {
      return (
        <div className="relative rounded-xl border-2 border-primary bg-card p-8 glow-primary">
          <div className="absolute inset-0 rounded-xl bg-gradient-to-br from-primary/10 via-transparent to-transparent"></div>
          <div className="relative">
            <div className="flex items-center gap-4 mb-6">
              <div className="p-3 rounded-xl bg-primary/20 text-primary">
                <TargetIcon />
              </div>
              <div>
                <h3 className="text-xl font-bold text-slate-100">Master Agent Decision</h3>
                <p className="text-sm text-slate-400">Final Synthesized Analysis</p>
              </div>
            </div>
            <div className="text-slate-200 leading-relaxed whitespace-pre-wrap text-base">
              {content || <span className="text-slate-500 italic">Awaiting analysis...</span>}
            </div>
          </div>
        </div>
      );
    }

    function FinancialDashboard() {
      const [ticker, setTicker] = useState('');
      const [riskProfile, setRiskProfile] = useState('Balanced');
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);

      const handleAnalyze = async () => {
        if (!ticker.trim()) {
          setError('Please enter a stock ticker');
          return;
        }

        setLoading(true);
        setError(null);
        setResult(null);

        try {
          const response = await fetch('http://localhost:8000/analyze', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              ticker: ticker.toUpperCase(),
              client_profile: riskProfile,
            }),
          });

          if (!response.ok) {
            throw new Error(`Analysis failed: ${response.statusText}`);
          }

          const data = await response.json();
          setResult(data);
        } catch (err) {
          console.log('Fetch error:', err);
          setError(
            err instanceof Error
              ? err.message
              : 'Failed to connect to analysis server. Please ensure the server is running.'
          );
        } finally {
          setLoading(false);
        }
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !loading) {
          handleAnalyze();
        }
      };

      return (
        <div className="min-h-screen bg-background">
          {/* Header */}
          <header className="border-b border-border bg-card/50 backdrop-blur-sm sticky top-0 z-10">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
              <div className="flex items-center gap-3">
                <div className="p-2 rounded-lg bg-primary/10 text-primary">
                  <ActivityIcon />
                </div>
                <div>
                  <h1 className="text-xl sm:text-2xl font-bold text-slate-100 tracking-tight">
                    Alpha Agent
                  </h1>
                  <p className="text-xs sm:text-sm text-slate-400">Quantitative AI Engine</p>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            {/* Input Section */}
            <div className="rounded-xl border border-border bg-card p-6 mb-8">
              <div className="flex flex-col lg:flex-row gap-4">
                {/* Ticker Input */}
                <div className="flex-1">
                  <label className="block text-sm font-medium text-slate-300 mb-2">
                    Stock Ticker
                  </label>
                  <div className="relative">
                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
                      <SearchIcon />
                    </div>
                    <input
                      type="text"
                      value={ticker}
                      onChange={(e) => setTicker(e.target.value.toUpperCase())}
                      onKeyDown={handleKeyDown}
                      placeholder="e.g., AAPL"
                      className="w-full pl-10 pr-4 py-3 bg-muted border border-border rounded-lg text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                    />
                  </div>
                </div>

                {/* Risk Profile Select */}
                <div className="lg:w-48">
                  <label className="block text-sm font-medium text-slate-300 mb-2">
                    Risk Profile
                  </label>
                  <select
                    value={riskProfile}
                    onChange={(e) => setRiskProfile(e.target.value)}
                    className="w-full px-4 py-3 bg-muted border border-border rounded-lg text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all cursor-pointer appearance-none"
                    style={{ backgroundImage: `url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e")`, backgroundPosition: 'right 0.5rem center', backgroundRepeat: 'no-repeat', backgroundSize: '1.5em 1.5em', paddingRight: '2.5rem' }}
                  >
                    <option value="Conservative">Conservative</option>
                    <option value="Balanced">Balanced</option>
                    <option value="Aggressive">Aggressive</option>
                  </select>
                </div>

                {/* Analyze Button */}
                <div className="lg:self-end">
                  <button
                    onClick={handleAnalyze}
                    disabled={loading}
                    className="w-full lg:w-auto px-8 py-3 bg-primary text-background font-semibold rounded-lg hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center justify-center gap-2"
                  >
                    {loading ? (
                      <>
                        <Spinner />
                        <span>Analyzing...</span>
                      </>
                    ) : (
                      <span>Initiate Analysis</span>
                    )}
                  </button>
                </div>
              </div>
            </div>

            {/* Error Display */}
            {error && (
              <div className="mb-8 p-4 rounded-xl border border-red-500/30 bg-red-500/10 flex items-start gap-3">
                <div className="text-red-400 mt-0.5">
                  <AlertCircleIcon />
                </div>
                <div>
                  <h4 className="font-medium text-red-400">Analysis Error</h4>
                  <p className="text-sm text-red-300/80 mt-1">{error}</p>
                </div>
              </div>
            )}

            {/* Loading State */}
            {loading && (
              <div className="flex flex-col items-center justify-center py-16">
                <div className="relative">
                  <div className="w-16 h-16 border-4 border-primary/20 rounded-full"></div>
                  <div className="absolute top-0 left-0 w-16 h-16 border-4 border-transparent border-t-primary rounded-full animate-spin"></div>
                </div>
                <p className="mt-6 text-slate-400">
                  Analyzing <span className="text-primary font-semibold">{ticker}</span> with{' '}
                  <span className="text-slate-300">{riskProfile}</span> risk profile...
                </p>
                <p className="mt-2 text-sm text-slate-500">
                  Running multi-agent analysis pipeline
                </p>
              </div>
            )}

            {/* Results Display */}
            {result && !loading && (
              <div className="space-y-6">
                {/* Agent Cards Grid */}
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                  <AgentCard
                    title="News Agent"
                    icon={<NewspaperIcon />}
                    content={result.reports?.news}
                    accentColor="#a78bfa"
                  />
                  <AgentCard
                    title="Fundamentals Agent"
                    icon={<BarChartIcon />}
                    content={result.reports?.fundamentals}
                    accentColor="#2dd4bf"
                  />
                  <AgentCard
                    title="Risk Agent"
                    icon={<AlertTriangleIcon />}
                    content={result.reports?.risk}
                    accentColor="#fbbf24"
                  />
                </div>

                {/* Master Decision Card */}
                <MasterDecisionCard content={result.master_decision} />
              </div>
            )}

            {/* Empty State */}
            {!result && !loading && !error && (
              <div className="text-center py-16">
                <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-muted mb-4">
                  <TargetIcon />
                </div>
                <h3 className="text-lg font-medium text-slate-300 mb-2">
                  Ready to Analyze
                </h3>
                <p className="text-slate-500 max-w-md mx-auto">
                  Enter a stock ticker and select your risk profile to initiate the AI-powered
                  quantitative analysis.
                </p>
              </div>
            )}
          </main>

          {/* Footer */}
          <footer className="border-t border-border mt-auto">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
              <p className="text-center text-sm text-slate-500">
                Alpha Agent Quantitative AI Engine
              </p>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<FinancialDashboard />);
  </script>
</body>
</html>
